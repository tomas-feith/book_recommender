name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync environment (locked)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run --no-sync ruff check .

      - name: Ruff format
        run: uv run --no-sync ruff format --check .

      - name: Mypy
        run: uv run --no-sync mypy

      - name: Pytest (with coverage floor)
        run: uv run --no-sync python -m pytest --cov=app --cov=eval --cov-report=term-missing

  audit:
    # Advisory: reports vulnerable dependencies without blocking the merge.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: pip-audit
        run: uv run --no-sync pip-audit
